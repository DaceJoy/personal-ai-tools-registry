    description: "Curated collections of Claude Code skills and specialist roles"

  - id: security-scanning
    display_name: Security Scanning
    emoji: "🔒"
    description: "Tools for auditing agent configs, hooks, MCP servers, and secrets"

  - id: code-context-tools
